<script>  
// ------------------------------------------------------------------  
// SECURE API ENDPOINT (exactly as given but 100% functional)

function getApiUrl(uid) {  
  return "https://ammarhackerffinfoapi.vercel.app/get_player_personal_show?server=PK&uid=" + encodeURIComponent(uid);  
}  
  
let globalRawData = null;     // stores full JSON  
let currentTab = 0;  
  
// Helper to safely access nested values  
function safeValue(obj, path, fallback = "—") {  
  try {  
    const keys = path.split('.');  
    let val = obj;  
    for (let k of keys) {  
      if (val === undefined || val === null) return fallback;  
      val = val[k];  
    }  
    return (val === undefined || val === null) ? fallback : val;  
  } catch(e) {  
    return fallback;  
  }  
}  
  
// Format timestamp to readable date (seconds)  
function formatTimestamp(seconds) {  
  if (!seconds || seconds === "0" || seconds === 0) return "—";  
  let ts = parseInt(seconds);  
  if (isNaN(ts)) return seconds;  
  const date = new Date(ts * 1000);  
  return date.toLocaleString(undefined, { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });  
}  
  
// Render content based on active tab using global data  
function renderTab(tabIndex) {  
  if (!globalRawData) {  
    document.getElementById("dynamicContent").innerHTML = '<div class="loader">⚠️ No data loaded. Insert UID first.</div>';  
    return;  
  }  
  
  const data = globalRawData;  
  const basic = data.basicinfo || {};  
  const profile = data.profileinfo || {};  
  const pet = data.petinfo || {};  
  const social = data.socialinfo || {};  
  const credit = data.creditscoreinfo || {};  
  const clan = data.clanbasicinfo || {};  
  const diamond = data.diamondcostres || {};  
  
  let html = '';  
  
  switch(tabIndex) {  
    // --------------------- TAB 0 : MAIN (BASIC INFO + RANK + LIKES + CREATE DATE)  
    case 0:  
      const createSec = basic.createat || basic.createat === 0 ? basic.createat : null;  
      const lastLoginSec = basic.lastloginat;  
      html = `

        <div class="info-card"><div class="info-label">🆔 ACCOUNT ID</div><div class="info-value">${basic.accountid || "—"}</div></div>  
        <div class="info-card"><div class="info-label">⭐ LEVEL / EXP</div><div class="info-value">Level ${basic.level || "—"}  •  XP: ${basic.exp?.toLocaleString() || "—"}</div></div>

        <div class="info-card"><div class="info-label">🎖️ MAX RANK / CS MAX RANK</div><div class="info-value">MAX Rank: ${basic.maxrank || "—"}  | CS Max: ${basic.csmaxrank || "—"}</div></div>  
      `;  
      break;  
    // --------------------- TAB 1 : PROFILE (AVATAR, CLOTHES, EQUIPPED SKILLS, BANNER)  
    case 1:  
      const skills = profile.equipedskills || [];  
      const clothes = profile.clothes || [];  
      html = `  
        <div class="info-card"><div class="info-label">🎭 AVATAR ID</div><div class="info-value">${profile.avatarid || "—"}</div></div>  
        <div class="info-card"><div class="info-label">🖼️ BANNER ID (basic)</div><div class="info-value">${basic.bannerid || "—"}</div></div>  
        <div class="info-card"><div class="info-label">👕 CLOTHES / SKIN IDS</div><div class="info-value">${clothes.length ? clothes.join(", ") : "—"}</div></div>  
        <div class="info-card"><div class="info-label">⚡ EQUIPPED SKILLS (6)</div><div class="info-value">${skills.map(s => `<span class="skill-badge">${escapeHtml(s)}</span>`).join('') || "—"}</div></div>  
        <div class="info-card"><div class="info-label">✨ MARKED STAR</div><div class="info-value">${profile.ismarkedstar ? "⭐ YES (VIP STAR)" : "❌ No"}</div></div>  
        <div class="info-card"><div class="info-label">🎨 HEADPIC ID</div><div class="info-value">${basic.headpic || "—"}</div></div>  
      `;  
      break;  
    // --------------------- TAB 2 : PET INFO (full details)  
    case 2:  
      html = `  
        <div class="info-card"><div class="info-label">🐕 PET ID</div><div class="info-value">${pet.id || "—"}</div></div>  
        <div class="info-card"><div class="info-label">📈 PET LEVEL</div><div class="info-value">${pet.level || "—"}  (EXP: ${pet.exp?.toLocaleString() || "0"})</div></div>  
        <div class="info-card"><div class="info-label">🎽 PET SKIN ID</div><div class="info-value">${pet.skinid || "—"}</div></div>  
        <div class="info-card"><div class="info-label">✨ SELECTED SKILL ID</div><div class="info-value">${pet.selectedskillid || "—"}</div></div>  
        <div class="info-card"><div class="info-label">✅ IS SELECTED</div><div class="info-value">${pet.isselected ? "✔️ Active Pet" : "❌ Not Active"}</div></div>  
      `;  
      break;  
    // --------------------- TAB 3 : SOCIAL (BIO, LANGUAGE, GENDER, PREFERENCE)  
    case 3:  
      html = `

        <div class="info-card"><div class="info-label">🌐 LANGUAGE</div><div class="info-value">${social.language || "—"}</div></div>

        <div class="info-card"><div class="info-label">⏰ TIME ONLINE PREF</div><div class="info-value">${social.timeonline || "—"}</div></div>  
        <div class="info-card"><div class="info-label">🎮 MODE PREFERENCE</div><div class="info-value">${social.modeprefer || "—"}</div></div>  
        <div class="info-card"><div class="info-label">🏷️ SOCIAL TAGS</div><div class="info-value">${(social.socialtag || []).join(", ") || "—"}</div></div>  
      `;  
      break;  
    // --------------------- TAB 4 : ADVANCED (CREDIT SCORE, DIAMOND COST, CLAN, REGION)  
    case 4:  
      const clanName = clan.clanname || (clan.name) || "No Clan";  
      html = `  
        <div class="info-card"><div class="info-label">💎 CREDIT SCORE (Trust)</div><div class="info-value">${credit.creditscore ?? "—"} / 100  •  Reward: ${credit.rewardstate === "REWARDSTATEUNCLAIMED" ? "⚠️ Unclaimed" : credit.rewardstate || "—"}</div></div>  
        <div class="info-card"><div class="info-label">💰 DIAMOND COST (Value)</div><div class="info-value">💎 ${diamond.diamondcost ?? "—"} Diamonds</div></div>  
        <div class="info-card"><div class="info-label">🏰 CLAN INFO</div><div class="info-value">${escapeHtml(clanName)} (ID: ${clan.clanid || "—"})</div></div>

        <div class="info-card"><div class="info-label">🎖️ HIPPO RANK</div><div class="info-value">Rank ${basic.hipporank || "—"}  •  Points: ${basic.hipporankingpoints || "—"}</div></div>  
        <div class="info-card"><div class="info-label">🔖 BADGE ID</div><div class="info-value">${basic.badgeid || "—"}</div></div>  
      `;  
      break;  
    // --------------------- TAB 5 : ACCOUNT TIMELINE (create, last login, season, unlock times)  
    case 5:

      const endTime = profile.endtime;

      const summaryEnd = credit.periodicsummaryendtime;

        <div class="info-card"><div class="info-label">⏱️ LAST LOGOUT / LOGIN</div><div class="info-value">Last Login: ${formatTimestamp(lastRaw)}</div></div>  
        <div class="info-card"><div class="info-label">🎬 SEASON ID (current)</div><div class="info-value">Season ${seasonId || "—"}</div></div>  
        <div class="info-card"><div class="info-label">⏳ PROFILE UNLOCK TIME</div><div class="info-value">${unlockTime ? formatTimestamp(unlockTime) : "—"}</div></div>  
        <div class="info-card"><div class="info-label">⌛ PROFILE END TIME</div><div class="info-value">${endTime ? formatTimestamp(endTime) : "—"}</div></div>  
        <div class="info-card"><div class="info-label">📊 PERIODIC SUMMARY END</div><div class="info-value">${summaryEnd ? formatTimestamp(summaryEnd) : "—"}</div></div>  
        <div class="info-card"><div class="info-label">🕹️ ACCOUNT AGE (days approx)</div><div class="info-value">${createRaw ? Math.floor((Date.now()/1000 - parseInt(createRaw)) / 86400) + " days" : "—"}</div></div>  
      `;  
      break;  
    default: html = `<div class="loader">✨ No data</div>`;  
  }  
  
  document.getElementById("dynamicContent").innerHTML = html;  
}  
  
// helper to prevent XSS  
function escapeHtml(str) {  
  if (!str) return str;  
  return String(str).replace(/[&<>]/g, function(m) {  
    if (m === '&') return '&amp;';  
    if (m === '<') return '&lt;';  
    if (m === '>') return '&gt;';  
    return m;  
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {  
    return c;  
  });  
}  
  
// FETCH DATA FROM API (full integration) - FIXED: always shows loading first time and every time  
async function fetchPlayerData(uid) {  
  const tabsPanel = document.getElementById("tabsPanel");  
  const dynamicContentDiv = document.getElementById("dynamicContent");  
  
  // IMPORTANT FIX: Before fetching, ALWAYS show loading message in dynamicContent  
  // and also ensure the tabs panel is still hidden (or we show loader inside)  
  // But we want "first time" loading message to appear clearly.  
  // Hide tabs panel until data arrives, show full loader in dynamicContent  
  tabsPanel.style.display = "none";   // hide tabs while loading  
  
  // Manually create a temporary loader inside dynamicContent (since tabsPanel is hidden but dynamicContent still exists inside it, but we need direct access)  
  // Since dynamicContent is inside tabsPanel and tabsPanel is display:none, the content is hidden. So we need a temporary container?  
  // Better: we create a loader right inside the container before hiding? Wait, but we want the loader visible.  
  // Actually the dynamicContent is child of tabsPanel. If tabsPanel display:none, the whole loader will be hidden.  
  // So to make loading visible even before tabs appear, we need to show loader in a different way? No — we must keep tabsPanel visible but with loading state? But tabsPanel initially hidden.  
  // The original issue: first time no loading message because dynamicContent inside hidden panel.  
  // Solution: Before fetch, set tabsPanel style to "block" temporarily to show the loader, but after fetch we fill data and keep visible.  
  // But requirement: tabsPanel should become visible only after successful data? No, we can show loading message first time in same area without hiding entire panel.  
  // The CORRECT fix: Keep tabsPanel always visible? But originally hidden until data loads. We change approach:  
  // We will set tabsPanel to "block" right when clicking start attack, show loading message in dynamicContent, then after data load render content.  
  // This ensures the first-time click shows loading. Then after success, we show tabs and data.  
  // But the original design: hide tabs until data success. We will keep that but set tabsPanel to "block" immediately and show loader in dynamicContent.  
  // That way the loader is visible. After data, we render tabs and keep panel visible.  
  
  // SET PANEL VISIBLE to display loading message  
  tabsPanel.style.display = "block";  
  // Show loading message inside dynamicContent  
  dynamicContentDiv.innerHTML = `<div class="loader">🔍 Hacking UID ${escapeHtml(uid)}...<br>🛸 live Wait..</div>`;  
  
  try {  
    const url = getApiUrl(uid);  
    const response = await fetch(url);  
    if (!response.ok) throw new Error(`HTTP ${response.status}`);  
    const jsonData = await response.json();  
      
    // store globally  
    globalRawData = jsonData;  
      
    // if any missing fields we still show  
    if (!jsonData.basicinfo) {  
      jsonData.basicinfo = {};  
    }  
      
    // Reset active tab UI  
    currentTab = 0;  
    const tabBtns = document.querySelectorAll('.tab-btn');  
    tabBtns.forEach((btn, idx) => {  
      if (idx === 0) btn.classList.add('active');  
      else btn.classList.remove('active');  
    });  
      
    // Render main tab content  
    renderTab(0);  
      
  } catch (err) {  
    console.error(err);  
    // On error, show error inside dynamicContent, keep tabsPanel visible so user sees error  
    dynamicContentDiv.innerHTML = `<div class="info-card" style="border-left-color:red;"><div class="info-label">⚠️ ERROR</div><div class="info-value">Failed to load data. Check UID or network.<br>${err.message}</div></div>`;  
    globalRawData = null;  
    // We keep tabsPanel visible but show error message; no need to hide  
  }  
}  
  
// Tab click handler + ui update  
function initTabs() {  
  const tabBtns = document.querySelectorAll('.tab-btn');  
  tabBtns.forEach((btn) => {  
    btn.addEventListener('click', (e) => {  
      const tabVal = btn.getAttribute('data-tab');  
      if (tabVal !== null) {  
        currentTab = parseInt(tabVal);  
        // update active styles  
        tabBtns.forEach(b => b.classList.remove('active'));  
        btn.classList.add('active');  
        if (globalRawData) {  
          renderTab(currentTab);  
        } else {  
          document.getElementById("dynamicContent").innerHTML = '<div class="loader">❌ No data loaded. Enter UID first.</div>';  
        }  
      }  
    });  
  });  
}  
  
// Main attack / load button  
document.getElementById("fetchBtn").addEventListener("click", () => {  
  const uid = document.getElementById("uidInput").value.trim();  
  if (uid === "") {  
    alert("⚠️ Please enter valid UID (numeric)");  
    return;  
  }  
  if (!/^\d+$/.test(uid)) {  
    alert("UID should contain only numbers!");  
    return;  
  }  
  fetchPlayerData(uid);  
});  
  
// also enter key support  
document.getElementById("uidInput").addEventListener("keypress", (e) => {  
  if (e.key === "Enter") {  
    document.getElementById("fetchBtn").click();  
  }  
});  
  
// start tabs listener after dom ready  
document.addEventListener("DOMContentLoaded", () => {  
  initTabs();  
  // Initially tabs panel is hidden but we will show it as soon as attack button is clicked.  
  // To maintain original style: keep hidden initially (no data)  
  document.getElementById("tabsPanel").style.display = "none";  
});  
</script>
